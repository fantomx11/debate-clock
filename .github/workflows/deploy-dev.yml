name: Deploy Dev
on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write      
  id-token: write   

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main (Production Base)
        uses: actions/checkout@v4
        with:
          ref: main
          path: staging    

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev_code        

      - name: Nest Dev Preview Environment
        run: |
          mkdir -p staging/dev
          
          # Prevent the script from crashing if a glob (like *.js) finds nothing
          shopt -s nullglob
          
          # List all the items you want to copy
          items=(
            dev_code/classes
            dev_code/modules
            dev_code/styles
            dev_code/components
            dev_code/*.js
            dev_code/*.html
          )
          
          # Loop through and only copy them if they actually exist
          for item in "${items[@]}"; do
            if [ -e "$item" ]; then
              cp -r "$item" staging/dev/
              echo "Copied $item to staging/dev/"
            else
              echo "Skipping $item (does not exist)"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './staging'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5