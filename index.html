<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross Exam Clock</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.14.1/mqtt.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent-active: #00adb5;
            --mod-color: #e63946;
            --text-color: #eeeeee;
            --text-muted: #888888;
            --border-color: #333;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Setup Configurations */
        #setup-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .setup-card {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        #standard-setup, #invite-setup { display: none; }

        /* Navigation Metrics bar */
        #nav-bar {
            background-color: var(--panel-bg);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            flex-wrap: wrap;
            gap: 10px;
        }

        #mod-dashboard {
            background: #251c1c;
            border-bottom: 2px solid var(--mod-color);
            padding: 10px 20px;
            display: none;
            gap: 15px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mod-group {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0,0,0,0.2);
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #444;
        }

        /* Clock Grid Container Layout */
        #clock-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            justify-content: center;
            align-items: center;
        }

        .clock-panel {
            background: #151515;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            min-width: 290px;
            max-width: 420px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .clock-panel.single-view {
            max-width: 600px;
            width: 80%;
            height: 60vh;
        }

        .interactive {
            cursor: pointer;
            user-select: none;
            transition: background 0.2s, transform 0.1s;
        }
        .interactive:hover { background: #1c1c1c; }
        .interactive:active { transform: scale(0.99); }

        .clock-panel.running {
            background-color: #16262e;
        }
        .clock-panel.running .time-display {
            color: var(--accent-active);
            text-shadow: 0 0 15px rgba(0,173,181,0.4);
        }

        .speaker-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 5px;
            text-transform: capitalize;
        }

        .time-display {
            font-size: 5rem;
            font-family: monospace;
            font-weight: 700;
            margin: 10px 0;
        }
        
        .clock-panel.single-view .time-display {
            font-size: 8rem;
        }

        .sub-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .panel-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 15px;
            width: 100%;
            justify-content: center;
        }

        /* --- Custom Drag and Drop Architecture Styles --- */
        .role-icon {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: grab;
            user-select: none;
            color: white;
        }
        .role-hidden { background: #e63946; }
        .role-visible { background: #00adb5; }
        .role-controllable { background: #85e3b3; color: #121212; }
        
        .speaker-card {
            padding: 12px;
            background: #222;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .speaker-card:hover { background: #2a2a2a; }

        /* --- Custom Toast Notification Architecture --- */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: #222222;
            color: var(--text-color);
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            min-width: 240px;
            max-width: 360px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            border-left: 4px solid var(--accent-active);
            display: flex;
            align-items: center;
            animation: toastSlideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .toast.success { border-left-color: #85e3b3; }
        .toast.error { border-left-color: var(--mod-color); }
        .toast.info { border-left-color: var(--accent-active); }

        @keyframes toastSlideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes toastSlideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120%); opacity: 0; }
        }

        /* --- Custom Overlay Modal Architecture --- */
        #custom-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1500;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }

        /* Generic Utilities */
        .btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover { background-color: #444; }
        .btn-accent { background-color: var(--accent-active); }
        .btn-accent:hover { background-color: #008c95; }
        .btn-mod { background-color: var(--mod-color); }
        .btn-mod:hover { background-color: #b82c37; }
        .btn-sm { padding: 5px 10px; font-size: 0.8rem; }
        
        select, input {
            background: #2d2d2d;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            margin: 5px;
        }

        .badge {
            background: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="custom-modal-overlay">
        <div class="setup-card" style="max-width: 340px;">
            <h3 id="modal-title" style="margin-top: 0; color: var(--accent-active);">Set Exact Time</h3>
            <p id="modal-subtitle" style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px;">Target Clock: None</p>
            <div style="display: flex; justify-content: center; align-items: center; gap: 5px; margin-bottom: 20px;">
                <input type="number" id="modal-input-mins" placeholder="MM" min="0" max="99" style="width: 60px; text-align: center; font-size: 1.2rem; font-weight: bold;">
                <span style="font-size: 1.5rem; font-weight: bold;">:</span>
                <input type="number" id="modal-input-secs" placeholder="SS" min="0" max="59" style="width: 60px; text-align: center; font-size: 1.2rem; font-weight: bold;">
            </div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-accent" id="modal-submit-btn">Apply Override</button>
                <button class="btn" onclick="closeExactTimeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="setup-screen">
        <div class="setup-card">
            <h2>Anti-Filibuster Debate Arena</h2>
            
            <div id="standard-setup">
                <p>Start a new session as Master Moderator or join an active room code manually.</p>
                <button class="btn btn-accent" id="host-btn" style="width: 80%; margin-bottom: 25px;">Host as Moderator</button>
                <hr style="border-color: var(--border-color); margin: 20px 0;">
                <input type="text" id="join-id-input" placeholder="Enter Room Code" style="width: 75%; text-align: center;"><br>
                <input type="text" id="join-name-input" placeholder="Your Name" style="width: 75%; text-align: center;"><br><br>
                <button class="btn" id="join-btn">Join Session</button>
            </div>

            <div id="invite-setup">
                <p>You have been invited to join Room: <strong id="invite-room-label" style="color:var(--accent-active)">-----</strong></p>
                <input type="text" id="invite-name-input" placeholder="Enter Your Name" style="width: 80%; font-size: 1.1rem; text-align: center;"><br><br>
                <button class="btn btn-accent" id="invite-submit-btn" style="width: 80%;">Connect to Clock</button>
            </div>
        </div>
    </div>

    <div id="nav-bar">
        <div>Identity: <span id="role-badge" class="badge">None</span></div>
        <div>Room Code: <strong id="room-id-display" style="color: var(--accent-active)">---</strong></div>
        <div id="invite-link-wrapper" style="display:none;">
            <button class="btn btn-sm btn-accent" id="copy-link-btn">Copy Invite Link</button>
        </div>
        <div id="net-status" style="color: #ffb703;">Disconnected</div>
    </div>

    <div id="mod-dashboard">
        <strong style="color: var(--mod-color)">MASTER CONTROLS:</strong>
        
        <div class="mod-group">
            <label for="default-time-input" style="font-size: 0.85rem; color: var(--text-muted);">New Clock Default (sec):</label>
            <input type="number" id="default-time-input" value="180" min="1" style="width: 60px; padding: 4px; margin: 0; font-size: 0.85rem;">
            <button class="btn btn-sm btn-accent" onclick="updateGlobalDefaultTime()">Set</button>
        </div>

        <button class="btn btn-sm btn-mod" onclick="sendGlobalModAction('PAUSE_ALL')">Pause All Clocks</button>
        <button class="btn btn-sm btn-mod" onclick="sendGlobalModAction('RESET_ALL')">Reset All to Default</button>
    </div>

    <div id="clock-container">
        <div style="color: var(--text-muted); font-style: italic;" id="empty-state-msg">Waiting for speakers to step up...</div>
    </div>

    <script>
        const TOPIC_NAMESPACE = "debate_sys_dynamic_2026_";
        
        let isHost = false;
        let roomId = '';
        let myUsername = ''; 
        let mqttClient = null;
        let activeModalTargetClockId = null; 
        let selectedClockId = null; 
        let selectedSpeakerName = null; 
        let draggedRole = null; 

        let state = {
            defaultTime: 180, 
            clocks: {}, 
            speakers: [] 
        };

        // DOM Handles
        const setupScreen = document.getElementById('setup-screen');
        const standardSetup = document.getElementById('standard-setup');
        const inviteSetup = document.getElementById('invite-setup');
        const roleBadge = document.getElementById('role-badge');
        const roomIdDisplay = document.getElementById('room-id-display');
        const netStatus = document.getElementById('net-status');
        const modDashboard = document.getElementById('mod-dashboard');
        const clockContainer = document.getElementById('clock-container');
        const inviteLinkWrapper = document.getElementById('invite-link-wrapper');
        const defaultTimeInput = document.getElementById('default-time-input');
        
        // Modal Handles
        const modalOverlay = document.getElementById('custom-modal-overlay');
        const modalSubtitle = document.getElementById('modal-subtitle');
        const modalMinsInput = document.getElementById('modal-input-mins');
        const modalSecsInput = document.getElementById('modal-input-secs');
        const modalSubmitBtn = document.getElementById('modal-submit-btn');

        // --- URL Parameter Interceptor Scan ---
        const urlParams = new URLSearchParams(window.location.search);
        const urlRoomCode = urlParams.get('room');

        if (urlRoomCode) {
            roomId = urlRoomCode.trim();
            inviteSetup.style.display = 'block';
            document.getElementById('invite-room-label').textContent = roomId;
        } else {
            standardSetup.style.display = 'block';
        }

        // --- Custom Toast Dispatcher Engine ---
        function triggerToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'toastSlideOut 0.3s ease forwards';
                toast.addEventListener('animationend', () => toast.remove());
            }, 3500);
        }

        // --- Event Listeners UI Bindings ---
        document.getElementById('host-btn').addEventListener('click', () => {
            isHost = true;
            myUsername = 'Moderator';
            roomId = Math.floor(10000 + Math.random() * 90000).toString();
            initSessionConnection();
        });

        document.getElementById('join-btn').addEventListener('click', () => {
            const codeInput = document.getElementById('join-id-input').value.trim();
            const nameInput = document.getElementById('join-name-input').value.trim();
            if (!codeInput || !nameInput) return triggerToast("Please complete all setup fields.", "error");
            isHost = false;
            roomId = codeInput;
            myUsername = nameInput;
            initSessionConnection();
        });

        document.getElementById('invite-submit-btn').addEventListener('click', () => {
            const nameInput = document.getElementById('invite-name-input').value.trim();
            if (!nameInput) return triggerToast("Name entry is required to connect.", "error");
            isHost = false;
            myUsername = nameInput;
            initSessionConnection();
        });

        document.getElementById('copy-link-btn').addEventListener('click', () => {
            const inviteUrl = window.location.origin + window.location.pathname + "?room=" + roomId;
            navigator.clipboard.writeText(inviteUrl);
            triggerToast("Invite link copied to clipboard!", "success");
        });

        // --- Infrastructure Orchestrator ---
        function initSessionConnection() {
            netStatus.textContent = "Connecting to arena matrix...";
            setupScreen.style.display = 'none';
            roleBadge.textContent = myUsername;
            roomIdDisplay.textContent = roomId;

            if (isHost) {
                modDashboard.style.display = 'flex';
                inviteLinkWrapper.style.display = 'block';
            }

            mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

            mqttClient.on('connect', () => {
                netStatus.textContent = "Connected to Arena!";
                netStatus.style.color = "#85e3b3";
                triggerToast("Secure cloud bridge channel active.", "success");

                if (isHost) {
                    mqttClient.subscribe(TOPIC_NAMESPACE + roomId + "/commands");
                    setupMasterTickingLoop();
                    renderDynamicDashboard();
                } else {
                    mqttClient.subscribe(TOPIC_NAMESPACE + roomId + "/state");
                    mqttClient.publish(TOPIC_NAMESPACE + roomId + "/commands", JSON.stringify({ type: 'REGISTER_SPEAKER', username: myUsername }));
                }
            });

            mqttClient.on('message', (topic, payload) => {
                try {
                    const data = JSON.parse(payload.toString());
                    
                    if (isHost && topic.endsWith("/commands")) {
                        processIncomingClientCommands(data);
                    } else if (!isHost && topic.endsWith("/state")) {
                        state = data;
                        renderDynamicDashboard();
                    }
                } catch (e) {
                    console.error("Payload breakdown mapping fault:", e);
                }
            });
        }

        // --- Master Host State Engine ---
        let hostClockTicker = null;
        function setupMasterTickingLoop() {
            if (hostClockTicker) clearInterval(hostClockTicker);
            
            hostClockTicker = setInterval(() => {
                let mutableStateMutation = false;
                
                Object.keys(state.clocks).forEach(id => {
                    if (state.clocks[id].running) {
                        state.clocks[id].time = Math.max(0, state.clocks[id].time - 1);
                        if (state.clocks[id].time === 0) state.clocks[id].running = false;
                        mutableStateMutation = true;
                    }
                });

                if (mutableStateMutation) {
                    dispatchMasterStateBroadcast();
                    renderDynamicDashboard();
                }
            }, 1000);
        }

        function processIncomingClientCommands(cmd) {
            if (cmd.type === 'REGISTER_SPEAKER') {
                if (!state.speakers.includes(cmd.username)) {
                    state.speakers.push(cmd.username);
                    
                    // Auto-provision clock for the incoming speaker
                    const clockId = 'clk_' + Math.random().toString(36).substr(2, 9);
                    state.clocks[clockId] = {
                        id: clockId,
                        name: `${cmd.username}'s Clock`,
                        time: state.defaultTime,
                        running: false,
                        speakerAccess: {
                            [cmd.username]: 'controllable'
                        }
                    };
                    triggerToast(`Speaker connected: "${cmd.username}" (Auto-clock generated)`, "info");
                }
            }
            if (cmd.type === 'TOGGLE_CLOCK') {
                const clk = state.clocks[cmd.clockId];
                if (clk && clk.speakerAccess && clk.speakerAccess[cmd.username] === 'controllable') {
                    clk.running = !clk.running;
                }
            }
            dispatchMasterStateBroadcast();
            renderDynamicDashboard();
        }

        function dispatchMasterStateBroadcast() {
            if (mqttClient && mqttClient.connected) {
                mqttClient.publish(TOPIC_NAMESPACE + roomId + "/state", JSON.stringify(state));
            }
        }

        // --- Administrative Mod Controls ---
        function updateGlobalDefaultTime() {
            if (!isHost) return;
            const newDefault = parseInt(defaultTimeInput.value);
            if (!isNaN(newDefault) && newDefault > 0) {
                state.defaultTime = newDefault;
                dispatchMasterStateBroadcast();
                triggerToast(`Default time adjusted to ${newDefault}s.`, "success");
            }
        }

        function sendGlobalModAction(action) {
            if (!isHost) return;
            
            Object.keys(state.clocks).forEach(id => {
                if (action === 'PAUSE_ALL') state.clocks[id].running = false;
                if (action === 'RESET_ALL') {
                    state.clocks[id].running = false;
                    state.clocks[id].time = state.defaultTime; 
                }
            });
            dispatchMasterStateBroadcast();
            renderDynamicDashboard();
            triggerToast(action === 'PAUSE_ALL' ? "All clocks paused." : "All clocks reset to default.", "info");
        }

        function addNewClockPrompt() {
            if (!isHost) return;
            const name = prompt("Enter custom clock title name:");
            if (!name || name.trim() === "") return;
            
            const clockId = 'clk_' + Math.random().toString(36).substr(2, 9);
            state.clocks[clockId] = {
                id: clockId,
                name: name.trim(),
                time: state.defaultTime,
                running: false,
                speakerAccess: {} 
            };
            dispatchMasterStateBroadcast();
            renderDynamicDashboard();
            triggerToast(`Clock "${name}" created (Hidden by default).`, "success");
        }

        function selectClock(clockId) {
            if (!isHost) return;
            selectedClockId = (selectedClockId === clockId) ? null : clockId;
            renderDynamicDashboard();
        }

        function selectSpeaker(speakerName) {
            if (!isHost) return;
            selectedSpeakerName = (selectedSpeakerName === speakerName) ? null : speakerName;
            renderDynamicDashboard();
        }

        function executeClockAction(id, action, amount = 0) {
            if (!isHost) return;
            
            if (state.clocks[id]) {
                if (action === 'TOGGLE') state.clocks[id].running = !state.clocks[id].running;
                if (action === 'ADJUST') state.clocks[id].time = Math.max(0, state.clocks[id].time + amount);
                if (action === 'SET_EXACT') state.clocks[id].time = Math.max(0, amount);
                if (action === 'REMOVE') {
                    delete state.clocks[id];
                    if (selectedClockId === id) selectedClockId = null;
                    triggerToast("Clock deleted.", "info");
                }
            }
            dispatchMasterStateBroadcast();
            renderDynamicDashboard();
        }

        // --- Custom Overlay Modal Engine Controllers ---
        function openExactTimeModal(clockId) {
            if (!isHost) return;
            activeModalTargetClockId = clockId;
            
            const clk = state.clocks[clockId];
            const totalSeconds = clk.time;
            const displayMins = Math.floor(totalSeconds / 60);
            const displaySecs = totalSeconds % 60;

            modalSubtitle.textContent = `Target Clock: ${clk.name}`;
            modalMinsInput.value = displayMins;
            modalSecsInput.value = displaySecs;
            modalOverlay.style.display = 'flex';
            modalMinsInput.focus();
        }

        function closeExactTimeModal() {
            modalOverlay.style.display = 'none';
            activeModalTargetClockId = null;
        }

        modalSubmitBtn.addEventListener('click', () => {
            if (!isHost || !activeModalTargetClockId) return;

            const mins = parseInt(modalMinsInput.value) || 0;
            const secs = parseInt(modalSecsInput.value) || 0;

            if (mins < 0 || secs < 0 || secs > 59) {
                triggerToast("Invalid metrics. Seconds must fall within 0-59.", "error");
                return;
            }

            const calculatedTotalSeconds = (mins * 60) + secs;
            executeClockAction(activeModalTargetClockId, 'SET_EXACT', calculatedTotalSeconds);
            triggerToast(`Overwrote time indexing configurations.`, "success");
            closeExactTimeModal();
        });

        // --- Drag and Drop Access Assignment Methods ---
        function handleRoleDragStart(e, role) {
            draggedRole = role;
            e.dataTransfer.setData("text/plain", role);
        }

        function handleRoleDropOnSpeaker(e, username) {
            e.preventDefault();
            const role = e.dataTransfer.getData("text/plain") || draggedRole;
            if (!selectedClockId || !role) return;

            if (!state.clocks[selectedClockId].speakerAccess) {
                state.clocks[selectedClockId].speakerAccess = {};
            }
            
            state.clocks[selectedClockId].speakerAccess[username] = role;
            dispatchMasterStateBroadcast();
            renderDynamicDashboard();
            triggerToast(`Assigned ${username} -> ${role.toUpperCase()}`, "success");
        }

        function handleRoleDropOnClock(e, clockId) {
            e.preventDefault();
            const role = e.dataTransfer.getData("text/plain") || draggedRole;
            if (!selectedSpeakerName || !role) return;

            if (!state.clocks[clockId].speakerAccess) {
                state.clocks[clockId].speakerAccess = {};
            }

            state.clocks[clockId].speakerAccess[selectedSpeakerName] = role;
            dispatchMasterStateBroadcast();
            renderDynamicDashboard();
            triggerToast(`Assigned ${selectedSpeakerName} -> ${role.toUpperCase()} for ${state.clocks[clockId].name}`, "success");
        }

        // --- Action Emitters ---
        function handleClientClockToggle(clockId) {
            if (isHost) {
                executeClockAction(clockId, 'TOGGLE');
            } else {
                if (mqttClient && mqttClient.connected) {
                    mqttClient.publish(TOPIC_NAMESPACE + roomId + "/commands", JSON.stringify({ 
                        type: 'TOGGLE_CLOCK', 
                        clockId: clockId, 
                        username: myUsername 
                    }));
                }
            }
        }

        function handleSpeakerClocksToggle(speakerName, runningState) {
            if (!isHost) return;
            Object.values(state.clocks).forEach(clk => {
                if (clk.speakerAccess && clk.speakerAccess[speakerName] === 'controllable') {
                    clk.running = runningState;
                }
            });
            dispatchMasterStateBroadcast();
            renderDynamicDashboard();
            triggerToast(`${runningState ? 'Started' : 'Paused'} all clocks controlled by ${speakerName}`, "info");
        }

        // --- Layout Compilation Engines ---
        function formatTimeDisplayValue(seconds) {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        function renderDynamicDashboard() {
            clockContainer.innerHTML = '';

            if (isHost && document.activeElement !== defaultTimeInput) {
                defaultTimeInput.value = state.defaultTime;
            }

            if (isHost) {
                clockContainer.style.display = 'flex';
                clockContainer.style.alignItems = 'stretch';
                clockContainer.style.justifyContent = 'normal';
                clockContainer.style.width = '100%';
                clockContainer.style.boxSizing = 'border-box';

                const clocksList = Object.values(state.clocks);
                
                let clocksHTML = clocksList.map(clk => {
                    const isSelected = clk.id === selectedClockId;
                    
                    // Highlight border color context based on selected speaker's role
                    let borderStyles = 'border: 1px solid var(--border-color);';
                    if (selectedSpeakerName) {
                        const role = clk.speakerAccess ? clk.speakerAccess[selectedSpeakerName] : 'hidden';
                        if (role === 'controllable') borderStyles = 'border: 2px solid #85e3b3;';
                        else if (role === 'visible') borderStyles = 'border: 2px solid #00adb5;';
                        else borderStyles = 'border: 2px dashed #e63946;';
                    }

                    const selectShadow = isSelected ? 'box-shadow: 0 0 0 2px var(--accent-active); background: #1a272c;' : 'background: #151515;';
                    
                    return `
                        <div class="clock-panel ${clk.running ? 'running' : ''}" 
                             style="${borderStyles} ${selectShadow} max-width: none; min-width: 0; cursor: pointer; width: auto;" 
                             onclick="selectClock('${clk.id}')"
                             ondragover="event.preventDefault()"
                             ondrop="handleRoleDropOnClock(event, '${clk.id}')">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <strong style="font-size: 1.2rem; color:#fff;">${clk.name}</strong>
                                ${clk.running ? '<span class="badge" style="background: var(--accent-active)">RUNNING</span>' : '<span class="badge">PAUSED</span>'}
                            </div>
                            <div class="time-display" style="font-size: 3.5rem; margin: 5px 0;">${formatTimeDisplayValue(clk.time)}</div>
                            <div class="panel-controls" onclick="event.stopPropagation()">
                                <button class="btn btn-sm" onclick="handleClientClockToggle('${clk.id}')">${clk.running ? 'Pause' : 'Start'}</button>
                                <button class="btn btn-sm" onclick="executeClockAction('${clk.id}', 'ADJUST', 15)">+15s</button>
                                <button class="btn btn-sm" onclick="executeClockAction('${clk.id}', 'ADJUST', -15)">-15s</button>
                                <button class="btn btn-sm btn-accent" onclick="openExactTimeModal('${clk.id}')">Set Exact</button>
                                <button class="btn btn-sm btn-mod" onclick="executeClockAction('${clk.id}', 'REMOVE')">Delete</button>
                            </div>
                        </div>
                    `;
                }).join('');

                if (clocksList.length === 0) {
                    clocksHTML = `<div style="color: var(--text-muted); font-style: italic; padding: 20px; text-align: center;">No clocks created yet. Click "+ Add Clock" to begin.</div>`;
                }

                // Compile Role Drag Assignment Architecture Zones
                let roleZoneHTML = `<div style="font-size: 0.85rem; color: var(--text-muted); text-align: center; padding: 5px;">Select a clock or speaker to deploy role adjustments.</div>`;
                if (selectedClockId && state.clocks[selectedClockId]) {
                    const selectedClock = state.clocks[selectedClockId];
                    roleZoneHTML = `
                        <div style="background: #222; padding: 10px; border-radius: 6px; border: 1px solid #333; text-align: center;">
                            <div style="font-size: 0.8rem; margin-bottom: 8px; color: var(--text-muted);">Drag role onto speaker for <strong>${selectedClock.name}</strong>:</div>
                            <div style="display: flex; justify-content: center; gap: 8px;">
                                <div class="role-icon role-hidden" draggable="true" ondragstart="handleRoleDragStart(event, 'hidden')">🚫 Hidden</div>
                                <div class="role-icon role-visible" draggable="true" ondragstart="handleRoleDragStart(event, 'visible')">👁️ Visible</div>
                                <div class="role-icon role-controllable" draggable="true" ondragstart="handleRoleDragStart(event, 'controllable')">🕹️ Control</div>
                            </div>
                        </div>
                    `;
                } else if (selectedSpeakerName) {
                    roleZoneHTML = `
                        <div style="background: #222; padding: 10px; border-radius: 6px; border: 1px solid #333; text-align: center;">
                            <div style="font-size: 0.8rem; margin-bottom: 8px; color: var(--text-muted);">Drag role onto any Clock for <strong>${selectedSpeakerName}</strong>:</div>
                            <div style="display: flex; justify-content: center; gap: 8px;">
                                <div class="role-icon role-hidden" draggable="true" ondragstart="handleRoleDragStart(event, 'hidden')">🚫 Hidden</div>
                                <div class="role-icon role-visible" draggable="true" ondragstart="handleRoleDragStart(event, 'visible')">👁️ Visible</div>
                                <div class="role-icon role-controllable" draggable="true" ondragstart="handleRoleDragStart(event, 'controllable')">🕹️ Control</div>
                            </div>
                            <div style="margin-top: 12px; display: flex; gap: 5px; justify-content: center;">
                                <button class="btn btn-sm btn-accent" onclick="handleSpeakerClocksToggle('${selectedSpeakerName}', true)">Start All Controlled</button>
                                <button class="btn btn-sm btn-mod" onclick="handleSpeakerClocksToggle('${selectedSpeakerName}', false)">Pause All Controlled</button>
                            </div>
                        </div>
                    `;
                }

                let speakersHTML = state.speakers.map(name => {
                    let role = 'hidden';
                    if (selectedClockId && state.clocks[selectedClockId] && state.clocks[selectedClockId].speakerAccess) {
                        role = state.clocks[selectedClockId].speakerAccess[name] || 'hidden';
                    }

                    let borderStyles = 'border: 2px solid transparent;';
                    if (selectedClockId) {
                        if (role === 'controllable') borderStyles = 'border: 2px solid #85e3b3;';
                        else if (role === 'visible') borderStyles = 'border: 2px solid #00adb5;';
                        else borderStyles = 'border: 2px dashed #e63946;';
                    }

                    const isSpeakerSelected = name === selectedSpeakerName;
                    const selectionShadow = isSpeakerSelected ? 'box-shadow: 0 0 0 2px var(--accent-active); background: #1c2b30;' : '';

                    return `
                        <div class="speaker-card" 
                             style="${borderStyles} ${selectionShadow}" 
                             onclick="selectSpeaker('${name}')"
                             ondragover="event.preventDefault()" 
                             ondrop="handleRoleDropOnSpeaker(event, '${name}')">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span>👤 ${name}</span>
                                ${selectedClockId ? `<span style="font-size: 0.75rem; font-weight: bold; text-transform: uppercase; padding: 2px 6px; border-radius:3px; background:#111;">${role}</span>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');

                if (state.speakers.length === 0) {
                    speakersHTML = `<div style="color: var(--text-muted); font-style: italic; text-align: center; padding: 10px;">Waiting for connections...</div>`;
                }

                clockContainer.innerHTML = `
                    <div style="display: flex; width: 100%; gap: 20px; overflow: hidden; height: 100%;">
                        <div style="flex: 2; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 5px;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <h3 style="margin: 0; color: var(--accent-active);">Managed Clocks</h3>
                                <button class="btn btn-sm btn-accent" onclick="addNewClockPrompt()">+ Add Clock</button>
                            </div>
                            ${clocksHTML}
                        </div>
                        
                        <div style="flex: 1; background: #181818; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 15px; overflow-y: auto;">
                            <h3 style="margin: 0;">Speakers Pipeline</h3>
                            ${roleZoneHTML}
                            <div style="display: flex; flex-direction: column; gap: 10px;">
                                ${speakersHTML}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                clockContainer.style.display = 'flex';
                clockContainer.style.alignItems = 'center';
                clockContainer.style.justifyContent = 'center';

                const clientClocks = Object.values(state.clocks || {}).filter(clk => {
                    const access = clk.speakerAccess && clk.speakerAccess[myUsername];
                    return access === 'visible' || access === 'controllable';
                });

                if (clientClocks.length === 0) {
                    clockContainer.innerHTML = `<div style="color: var(--text-muted); font-style: italic; text-align: center;">No metrics clocks assigned to you yet. Waiting for Arena Moderator...</div>`;
                    return;
                }

                const viewHTML = clientClocks.map(clk => {
                    const access = clk.speakerAccess[myUsername];
                    const isControllable = access === 'controllable';
                    const isRunningClass = clk.running ? 'running' : '';
                    const clickAttr = isControllable ? `onclick="handleClientClockToggle('${clk.id}')"` : '';
                    const pointerCursor = isControllable ? 'cursor: pointer;' : 'cursor: default;';
                    
                    return `
                        <div class="clock-panel single-view ${isRunningClass}" style="${pointerCursor} max-width:450px; height: auto; padding: 40px 20px;" ${clickAttr}>
                            <div class="speaker-name" style="font-size: 2.5rem;">${clk.name}</div>
                            <div class="sub-label" style="font-size: 1.1rem; margin-bottom: 10px;">${isControllable ? 'Tap Panel to Start/Stop' : 'View Only Mode'}</div>
                            <div class="time-display" style="font-size: 6rem; margin: 0;">${formatTimeDisplayValue(clk.time)}</div>
                            <div class="sub-label" style="font-size: 1rem; color: var(--text-muted); margin-top: 10px;">
                                Boundary: <span style="color:#fff; font-weight:bold;">${access.toUpperCase()}</span> | Status: ${clk.running ? 'ACTIVE' : 'PAUSED'}
                            </div>
                        </div>
                    `;
                }).join('');

                clockContainer.innerHTML = `<div style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; box-sizing: border-box; padding: 10px;">${viewHTML}</div>`;
            }
        }

        // Global key capture toggle binds
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                if (isHost) {
                    sendGlobalModAction('PAUSE_ALL');
                } else {
                    const firstControllable = Object.values(state.clocks).find(clk => clk.speakerAccess && clk.speakerAccess[myUsername] === 'controllable');
                    if (firstControllable) {
                        handleClientClockToggle(firstControllable.id);
                    }
                }
            }
        });

        renderDynamicDashboard();
    </script>
</body>
</html>
